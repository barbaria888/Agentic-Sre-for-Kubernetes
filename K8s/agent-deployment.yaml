apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-agent
  template:
    metadata:
      labels:
        app: ai-agent
    spec:
      serviceAccountName: agent-sa
      containers:
      - name: agent
        image: hardik0811/sre-agent:latest
        imagePullPolicy: Always

        ports:
        - containerPort: 8000

        env:
        - name: CHROMA_HOST
          value: "chroma"

        - name: CHROMA_PORT
          value: "8000"

        - name: OLLAMA_HOST
          value: "ollama"
