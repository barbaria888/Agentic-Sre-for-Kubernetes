# deployment + service for vector db chroma
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chroma
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chroma
  template:
    metadata:
      labels:
        app: chroma
    spec:
      containers:
      - name: chroma
        image: chromadb/chroma:0.4.24   # 🔥 stable version
        
        ports:
        - containerPort: 8000
        env:
        - name: IS_PERSISTENT
          value: "FALSE"
        volumeMounts:
        - name: chroma-data
          mountPath: /chroma/.chroma
      volumes:
      - name: chroma-data
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: chroma
spec:
  selector:
    app: chroma
  ports:
  - port: 8000
    targetPort: 8000
